name: CI/CD

on:
  push:
    branches: [ "main", "feature/ci-cd" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Testes (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar testes
        run: pytest

  deploy:
    name: Deploy (CD)
    runs-on: ubuntu-latest
    needs: test   # 👈 só roda se o CI passar

    if: github.ref == 'refs/heads/main'  # 👈 só roda na main

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Simular deploy
        run: echo "Deploy realizado com sucesso 🚀"