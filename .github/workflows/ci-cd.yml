name: CI/CD

on:
  push:
    branches: [ "main", "feature/ci-cd" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Testes (CI)
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar testes
        run: pytest

  deploy:
    name: Deploy (CD)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Simular deploy
        run: echo "Deploy realizado com sucesso 🚀"

  notify:
    name: Notificação Discord
    runs-on: ubuntu-latest
    needs: [test, deploy]

    steps:
      - name: Enviar mensagem para Discord
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{"content": "🚀 CI/CD executado com sucesso no GitHub!"}' \
          ${{ secrets.DISCORD_WEBHOOK }}